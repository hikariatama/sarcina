{{- if .Values.frontend.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "luggage-locker.frontendFullname" . }}
  namespace: {{ include "luggage-locker.namespace" . }}
  labels:
    {{- include "luggage-locker.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
  {{- $frontendAnnotations := .Values.frontend.ingress.annotations | default dict }}
  {{- if or (gt (len $frontendAnnotations) 0) (and .Values.frontend.ingress.tls.enabled .Values.certManager.clusterIssuer) }}
  annotations:
    {{- if and .Values.frontend.ingress.tls.enabled .Values.certManager.clusterIssuer }}
    cert-manager.io/cluster-issuer: {{ .Values.certManager.clusterIssuer | quote }}
    {{- end }}
    {{- with $frontendAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.frontend.ingress.className }}
  {{- if .Values.frontend.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.frontend.ingress.host }}
      secretName: {{ .Values.frontend.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.frontend.ingress.host }}
      http:
        paths:
          - path: {{ .Values.frontend.ingress.path }}
            pathType: {{ .Values.frontend.ingress.pathType }}
            backend:
              service:
                name: {{ include "luggage-locker.frontendFullname" . }}
                port:
                  name: http
{{- end }}
