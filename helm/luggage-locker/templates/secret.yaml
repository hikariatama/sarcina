{{- $secrets := .Values.secrets | default dict -}}
{{- $convexInstanceSecret := get $secrets "convexInstanceSecret" | required "secrets.convexInstanceSecret must be provided" -}}
{{- $postgresPassword := get $secrets "postgresPassword" | required "secrets.postgresPassword must be provided" -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "luggage-locker.secretName" . }}
  namespace: {{ include "luggage-locker.namespace" . }}
  labels:
    {{- include "luggage-locker.labels" . | nindent 4 }}
type: Opaque
stringData:
  CONVEX_INSTANCE_SECRET: {{ $convexInstanceSecret | quote }}
  POSTGRES_PASSWORD: {{ $postgresPassword | quote }}
  POSTGRES_URL: {{ printf "postgresql://%s:%s@%s:%v" .Values.postgres.username $postgresPassword (include "luggage-locker.postgresFullname" .) (.Values.postgres.service.port | int) | quote }}
