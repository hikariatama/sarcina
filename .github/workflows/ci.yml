name: CI

permissions:
  contents: read

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run typecheck
      - run: bun test
      - run: bun run build

  helm:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: |
          helm lint helm/luggage-locker \
            -f helm/luggage-locker/values-prod.yaml \
            --set-string secrets.convexInstanceSecret=lint-placeholder \
            --set-string secrets.postgresPassword=lint-placeholder
      - run: |
          helm template sarcina helm/luggage-locker \
            -f helm/luggage-locker/values-prod.yaml \
            --set-string secrets.convexInstanceSecret=template-placeholder \
            --set-string secrets.postgresPassword=template-placeholder \
            > /tmp/sarcina-rendered.yaml

  publish_frontend:
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.frontend
          push: true
          provenance: false
          tags: ghcr.io/hikariatama/sarcina-frontend:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    needs:
      - helm
      - publish_frontend
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: azure/setup-helm@v4
      - uses: azure/setup-kubectl@v4
      - name: Install deploy dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          printf '%s' "${KUBE_CONFIG_DATA}" | base64 -d > ~/.kube/config
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
      - name: Sync GHCR pull secret
        run: |
          kubectl create namespace "${DEPLOY_NAMESPACE}" --dry-run=client -o yaml | kubectl apply -f -
          kubectl -n "${DEPLOY_NAMESPACE}" create secret docker-registry ghcr-pull \
            --docker-server=ghcr.io \
            --docker-username="hikariatama" \
            --docker-password="${GHCR_PULL_TOKEN}" \
            --dry-run=client \
            -o yaml | kubectl apply -f -
        env:
          DEPLOY_NAMESPACE: sarcina
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
      - name: Deploy with Helm
        run: |
          helm upgrade --install sarcina helm/luggage-locker \
            --namespace sarcina \
            --create-namespace \
            -f helm/luggage-locker/values-prod.yaml \
            --set-string frontend.image.tag="${IMAGE_TAG}" \
            --set-string secrets.convexInstanceSecret="${CONVEX_INSTANCE_SECRET}" \
            --set-string secrets.postgresPassword="${POSTGRES_PASSWORD}"
        env:
          IMAGE_TAG: ${{ github.sha }}
          CONVEX_INSTANCE_SECRET: ${{ secrets.CONVEX_INSTANCE_SECRET }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      - name: Wait for rollouts
        run: |
          kubectl -n sarcina rollout status statefulset/postgres --timeout=300s
          kubectl -n sarcina rollout status deployment/convex --timeout=300s
          kubectl -n sarcina rollout status deployment/sarcina-frontend --timeout=300s
      - name: Wait for certificates
        run: |
          for _ in $(seq 1 60); do
            cert_count="$(kubectl -n sarcina get certificate --no-headers 2>/dev/null | wc -l | tr -d ' ')"
            if [ "${cert_count}" -ge 3 ]; then
              break
            fi
            sleep 5
          done
          kubectl -n sarcina wait --for=condition=Ready certificate --all --timeout=600s
      - name: Generate Convex admin key
        run: |
          convex_admin_key="$(kubectl -n sarcina exec deploy/convex -- ./generate_admin_key.sh | tr -d '\r' | tail -n 1)"
          echo "::add-mask::${convex_admin_key}"
          printf 'CONVEX_SELF_HOSTED_ADMIN_KEY=%s\n' "${convex_admin_key}" >> "${GITHUB_ENV}"
      - name: Push Convex functions
        run: |
          bunx convex dev \
            --url "https://backend.sarcina.dgazizullin.dev" \
            --admin-key "${CONVEX_SELF_HOSTED_ADMIN_KEY}" \
            --once \
            --typecheck disable \
            --tail-logs disable
      - name: Run smoke test
        run: ./scripts/smoke-test-self-hosted.sh
        env:
          FRONTEND_URL: https://sarcina.dgazizullin.dev
          CONVEX_API_URL: https://backend.sarcina.dgazizullin.dev
          CONVEX_SITE_URL: https://convex.sarcina.dgazizullin.dev
          CONVEX_SELF_HOSTED_URL: https://backend.sarcina.dgazizullin.dev
          CONVEX_SELF_HOSTED_ADMIN_KEY: ${{ env.CONVEX_SELF_HOSTED_ADMIN_KEY }}
